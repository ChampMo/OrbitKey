<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
</head>
<body style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: #f4f4f5; padding: 20px; color: #3f3f46;">
    <div style="max-width: 600px; margin: 0 auto; background-color: #ffffff; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05);">
        
        <div style="background-color: #f97316; padding: 20px; text-align: center;">
            <h2 style="margin: 0; color: #ffffff; font-size: 24px;">🚀 OrbitKey Bug Report</h2>
        </div>
        
        <div style="padding: 30px;">
            <p style="margin-top: 0; font-size: 16px;"><strong>From:</strong> <a href="mailto:{{user_email}}" style="color: #f97316;">{{user_email}}</a></p>
            
            <div style="background-color: #fafafa; border: 1px solid #e4e4e7; padding: 15px; border-radius: 6px; margin-bottom: 20px; font-size: 14px;">
                <p style="margin: 0 0 8px 0;"><strong>💻 OS:</strong> <span style="text-transform: capitalize;">{{os_name}}</span> ({{os_arch}})</p>
                <p style="margin: 0;"><strong>🏷️ App Version:</strong> v{{app_version}}</p>
            </div>

            <p style="font-size: 16px; margin-bottom: 10px;"><strong>Description:</strong></p>
            
            <div style="background-color: #f4f4f5; border-left: 4px solid #f97316; padding: 15px; border-radius: 4px; white-space: pre-wrap; font-family: monospace; font-size: 14px; line-height: 1.6;">{{description}}</div>
        </div>
        
        <div style="background-color: #fafafa; padding: 15px; text-align: center; border-top: 1px solid #e4e4e7;">
            <p style="margin: 0; font-size: 12px; color: #a1a1aa;">Sent automatically from OrbitKey Desktop App.</p>
        </div>

    </div>
</body>
</html>
