name: "Publish Release"

on:
  push:
    tags:
      - 'v*' # 💥 เปลี่ยนเป็น v* เพื่อให้รันทุกครั้งที่ Push Tag ขึ้นต้นด้วย v

jobs:
  publish:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest" # สำหรับ Mac
            args: "--target aarch64-apple-darwin"
          - platform: "windows-latest" # สำหรับ Windows
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # ตัวเลือกสำหรับ Mac Silicon
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libayatana-appindicator3-dev librsvg2-dev

      - name: install frontend dependencies
        run: npm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 💥 เพิ่ม 2 บรรทัดนี้ เพื่อให้ Tauri สร้างไฟล์สำหรับ Auto-update และเซ็นชื่อให้
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__ # จะดึงเวอร์ชันจาก tauri.conf.json อัตโนมัติ
          releaseName: "OrbitKey v__VERSION__"
          releaseBody: "See the assets below to download the latest version of OrbitKey."
          releaseDraft: true # ตั้งเป็น true ไว้ดีแล้วครับ จะได้เช็คความเรียบร้อยก่อนกด Publish จริง
          prerelease: false
          args: ${{ matrix.args }}